services:

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: guardian_circle_server
    env_file:
      - ./server/.env
    volumes:
      # Mount source code so HMR/nodemon works while running in Docker
      - ./server/src:/app/src
      - server_uploads:/app/uploads
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: guardian_circle_client
    env_file:
      - ./client/.env
    environment:
      VITE_API_PROXY_TARGET: http://server:3001
      VITE_API_URL: http://localhost:3001
      VITE_SOCKET_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      # Mount source code so HMR works while running in Docker
      - ./client/src:/usr/src/app/src
      # Protect the container's node_modules from being overwritten by the host mount
      - /usr/src/app/node_modules
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: guardian_circle_adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  server_uploads:
