version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: guardian_circle_postgres
    environment:
      POSTGRES_DB: guardian_circle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guardian_circle"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: guardian_circle_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: guardian_circle_server
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@guardian_circle_postgres:5432/guardian_circle
      REDIS_URL: redis://guardian_circle_redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: guardian_circle_client
    env_file:
      - ./client/.env
    environment:
      VITE_API_PROXY_TARGET: http://server:3001
      VITE_API_URL: http://localhost:3001
      VITE_SOCKET_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      # Mount source code so HMR works while running in Docker
      - ./client/src:/usr/src/app/src
      # Protect the container's node_modules from being overwritten by the host mount
      - /usr/src/app/node_modules
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
